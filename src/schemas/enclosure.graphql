type Actuator {
  fan: Boolean
  nebulizer: Boolean
  heater: Boolean
  lamp: Boolean
}

type Limits {
  tempMin: Float
  tempMax: Float
  humidityMin: Float
  humidityMax: Float
  noiseMax: Float
  luminosityMax: Float
}


type Enclosure {
  id: ID!
  name: String!
  speciesId: String
  photoUrl: String
  lastReadings: Variant
  limits: Limits
  actuators: Actuator
  status: String
  operatorIds: [String]
}

type ToggleActuatorResult {
  success: Boolean!
  message: String
}

input LimitsInput {
  tempMin: Float
  tempMax: Float
  humidityMin: Float
  humidityMax: Float
  noiseMax: Float
  luminosityMax: Float
}

input CreateEnclosureInput {
  name: String!
  speciesId: String
  photoUrl: String
  status: String
  limits: LimitsInput
  tempMin: Float
  tempMax: Float
  humidityMin: Float
  humidityMax: Float
  noiseMax: Float
  luminosityMax: Float
}

input UpdateEnclosureInput {
  name: String
  speciesId: String
  photoUrl: String
  status: String
  limits: LimitsInput
  tempMin: Float
  tempMax: Float
  humidityMin: Float
  humidityMax: Float
  noiseMax: Float
  luminosityMax: Float
}

type Query {
  enclosures(operatorId: ID): [Enclosure]
  enclosure(id: ID!): Enclosure
}

type Mutation {
  toggleActuator(enclosureId: ID!, actuatorType: String!, state: Boolean!): ToggleActuatorResult
  createEnclosure(input: CreateEnclosureInput!): Enclosure
  updateEnclosure(id: ID!, input: UpdateEnclosureInput!): Enclosure
  deleteEnclosure(id: ID!): DeleteResult
  seedEnclosures: [Enclosure]
}
