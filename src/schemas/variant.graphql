type Variant {
    id: ID
    enclosureId: ID
    temp: Float
    humidity: Float
    noise: Float
    luminosity: Float
    timestamp: String
}

input newVariantInput {
    enclosureId: ID!
    temp: Float!
    humidity: Float!
    noise: Float!
    luminosity: Float!
    timestamp: String
}

type MetricStats {
    min: Float
    max: Float
    avg: Float
}

type DashboardStats {
    temp: MetricStats
    humidity: MetricStats
    noise: MetricStats
    luminosity: MetricStats
}

type EnclosureDashboard {
    enclosureId: ID!
    latestReading: Variant
    history: [Variant]
    stats: DashboardStats
}

type VariantPage {
    items: [Variant]
    nextCursor: String
    hasMore: Boolean
}

type GlobalDashboard {
    totalEnclosures: Int
    statusCounts: StatusCounts
    averages: DashboardStats
    history: [Variant]
}

type StatusCounts {
    ok: Int
    warning: Int
    critical: Int
}

type Query {
    latestVariants(enclosureId: ID!, limit: Int): [Variant]
    enclosureDashboard(enclosureId: ID!, historyLimit: Int): EnclosureDashboard
    enclosureHistory(enclosureId: ID!, limit: Int, cursor: String): VariantPage
    globalHistory(limit: Int, cursor: String): VariantPage
    globalDashboard(historyLimit: Int): GlobalDashboard
}

type Mutation {
    createVariant(input: newVariantInput!): Variant
}

type Subscription {
    variantAdded(enclosureId: ID!): Variant
}
