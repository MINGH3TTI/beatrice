type Collaborator {
  id: ID!
  email: String!
  name: String
  role: String
  assignedEnclosures: [String]
  createdAt: String
  updatedAt: String
}

input CreateCollaboratorInput {
  email: String!
  name: String
  role: String
  assignedEnclosures: [String]
  password: String
  badgeId: String
}

input UpdateCollaboratorInput {
  name: String
  role: String
  assignedEnclosures: [String]
}

type Query {
  collaborators: [Collaborator]
  collaborator(id: ID!): Collaborator
  myProfile: Collaborator
  enclosuresByCollaborator(collaboratorId: ID!): [Enclosure]
  passwordResetRequests(status: PasswordResetRequestStatus): [PasswordResetRequest!]!
}

type AuthPayload {
  token: String!
  collaborator: Collaborator!
}

type ForgotPasswordResponse {
  success: Boolean!
  message: String!
}

enum PasswordResetRequestStatus {
  PENDING
  COMPLETED
}

type PasswordResetRequest {
  id: ID!
  collaboratorId: ID!
  collaboratorName: String
  email: String!
  status: PasswordResetRequestStatus!
  createdAt: String!
  completedAt: String
  completedBy: String
}

type DeleteResult {
  success: Boolean!
}

type Mutation {
  login(email: String!, password: String!): AuthPayload
  loginByBadge(badgeId: String!): AuthPayload
  forgotPassword(email: String!): ForgotPasswordResponse!
  createCollaborator(input: CreateCollaboratorInput!): Collaborator
  updateCollaborator(id: ID!, input: UpdateCollaboratorInput!): Collaborator
  updatePassword(id: ID!, password: String!): Collaborator
  completePasswordResetRequest(id: ID!, newPassword: String!): PasswordResetRequest!
  deleteCollaborator(id: ID!): DeleteResult
  assignEnclosureToCollaborator(collaboratorId: ID!, enclosureId: ID!): Collaborator
  removeEnclosureFromCollaborator(collaboratorId: ID!, enclosureId: ID!): Collaborator
  seedCollaborators: [Collaborator]
}
